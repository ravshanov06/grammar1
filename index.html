<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algebra va Sonlar Nazariyasi · 50 savol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0e12;
            color: #f0f2f6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .quiz-container {
            background: #161822;
            border: 1px solid #26293b;
            border-radius: 18px;
            padding: 28px 32px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            max-height: 98vh;
            overflow-y: auto;
        }
        .quiz-container::-webkit-scrollbar { width: 4px; }
        .quiz-container::-webkit-scrollbar-track { background: #161822; }
        .quiz-container::-webkit-scrollbar-thumb { background: #2e334c; border-radius: 10px; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .progress-bar {
            font-size: 0.78rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .score-display { color: #10b981; font-weight: 600; }
        .section-badge {
            display: inline-block;
            background: #1f2a3f;
            padding: 3px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #8db0e0;
            letter-spacing: 0.4px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 22px;
            color: #f3f5f9;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .option-btn {
            background: transparent;
            border: 1px solid #2e334c;
            color: #e8ecf5;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            width: 100%;
            line-height: 1.5;
        }
        .option-btn:hover:not(:disabled) {
            background: #1f2235;
            border-color: #6a7fa0;
        }
        .option-btn.correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.incorrect {
            background: rgba(239,68,68,0.16) !important;
            border-color: #ef4444 !important;
            color: #f87171;
        }
        .option-btn.show-correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.disabled { pointer-events: none; opacity: 0.8; }
        .option-btn.correct.disabled { opacity: 1; }
        .option-btn.show-correct.disabled { opacity: 1; }
        .next-btn-container {
            margin-top: 22px;
            display: flex;
            justify-content: flex-end;
        }
        .next-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }
        .next-btn:hover { opacity: 0.85; transform: scale(1.02); }
        .next-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .score-screen { text-align: center; padding: 30px 0; }
        .score-screen h2 { font-size: 2.2rem; margin-bottom: 8px; }
        .final-score { font-size: 1.2rem; color: #9ca3af; margin-bottom: 30px; }
        .final-score span { color: #10b981; font-weight: 700; font-size: 1.8rem; }
        .restart-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }
        .restart-btn:hover { opacity: 0.85; }
        @media (max-width: 600px) {
            .quiz-container { padding: 16px; }
            .question-text { font-size: 1.05rem; }
            .option-btn { font-size: 0.85rem; padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="top-bar">
            <div class="progress-bar" id="progress">Savol 1 / 50</div>
            <div class="progress-bar score-display" id="scoreDisplay">✅ 0</div>
        </div>
        <div class="section-badge" id="sectionBadge">Algebra va Sonlar Nazariyasi</div>
        <div class="question-text" id="question"></div>
        <div class="options-container" id="options"></div>
        <div class="next-btn-container">
            <button class="next-btn" id="nextBtn" disabled>Keyingi →</button>
        </div>
    </div>

    <script>
        const QUIZ_DATA = [
            { q: "Faqat ikkita turli natural bo'luvchilarga ega bo'lgan natural son ... deyiladi.", opts: ["Tub son", "Murakkab son", "Toq son", "Butun son"], correct: 0 },
            { q: "f(x) = x⁵ - 8x³ + 24x² - 24x + 16 ko'phadning ratsional ildizi?", opts: ["4", "3", "5", "2"], correct: 0 },
            { q: "n³ - n ifoda qaysi natural songa qoldiqsiz bo'linadi?", opts: ["6", "5", "8", "9"], correct: 0 },
            { q: "Quyidagi sonlardan qaysi biri 36 ga qoldiqsiz bo'linmaydi?", opts: ["4782", "8244", "2484", "2016"], correct: 0 },
            { q: "3*470 yozuvdagi * ni shunday raqam bilan almashtiringki, hosil bo'lgan son 45 ga qoldiqsiz bo'linsin.", opts: ["4", "0", "5", "6"], correct: 0 },
            { q: "a = bq + r tenglikda qoldiqli bo'lish sharti?", opts: ["0 ≤ r < |b|", "0 < r < |b|", "0 ≤ r ≤ |b|", "0 < r ≤ |b|"], correct: 0 },
            { q: "35 ta natural sonni ketma-ket yozish natijasida 123...3435 sonini 25 ga bo'lish qoldig'i?", opts: ["10", "11", "12", "9"], correct: 0 },
            { q: "a va b natural sonlar qanday shartda o'zaro tub sonlar deyiladi?", opts: ["EKUB(a,b) = 1", "EKUK(a,b) = ab", "a = b", "a + b = 1"], correct: 0 },
            { q: "Natural bo'luvchilar soni ikkitadan ortiq bo'lgan natural son ... deyiladi.", opts: ["Murakkab", "Tub son", "Toq son", "Qo'shma"], correct: 0 },
            { q: "Faqat ikkita natural bo'luvchiga ega bo'lgan natural son ... deyiladi.", opts: ["Tub son", "Murakkab son", "Toq son", "Qo'shma son"], correct: 0 },
            { q: "150,151,152,153,154,155,156,157,158,159 dan tub sonlar?", opts: ["151,157", "152,157", "155,151", "151,159"], correct: 0 },
            { q: "1321 soni tub yoki murakkab?", opts: ["Tub son", "Murakkab son", "Toq son", "Do'st son"], correct: 0 },
            { q: "1321 soni tub yoki murakkab ekanligini aniqlashda qaysi oxirgi tub songacha bo'lishni to'xtatamiz?", opts: ["31", "37", "39", "41"], correct: 0 },
            { q: "190,191,192,193,194,195,196,197,198,199,200 dan tub sonlar?", opts: ["191,193,197,199", "191,193,195,199", "191,192,193,197", "193,197,198,199"], correct: 0 },
            { q: "180,181,182,183 dan tub son?", opts: ["181", "182", "183", "180"], correct: 0 },
            { q: "1 dan n gacha bo'lgan sonlar orasidagi tub sonlarni aniqlash usuli?", opts: ["Eratosfen g'alviri", "Evklid g'alviri", "Eyler usuli", "Ferma g'alviri"], correct: 0 },
            { q: "594 va 378 ning umumiy bo'luvchilari nechta?", opts: ["8", "9", "7", "6"], correct: 0 },
            { q: "6 ga karrali ikki xonali natural sonlar nechta?", opts: ["15", "13", "11", "12"], correct: 0 },
            { q: "24 sonining natural bo'luvchilari yig'indisi?", opts: ["60", "48", "36", "24"], correct: 0 },
            { q: "24 soni bilan o'zaro tub va undan kichik natural sonlar nechta?", opts: ["8", "12", "16", "6"], correct: 0 },
            { q: "23! ni tub ko'paytuvchilarga yoyilmasida 2 ning darajasi?", opts: ["19", "20", "18", "24"], correct: 0 },
            { q: "23! ni tub ko'paytuvchilarga yoyilmasida 3 ning darajasi?", opts: ["9", "8", "6", "10"], correct: 0 },
            { q: "23! ni tub ko'paytuvchilarga yoyilmasida 5 ning darajasi?", opts: ["4", "3", "2", "5"], correct: 0 },
            { q: "15 va 25 sonlarining EKUKining natural bo'luvchilari nechta?", opts: ["6", "7", "8", "5"], correct: 0 },
            { q: "21 va 35 sonlarining EKUKI bilan EKUBI yig'indisi?", opts: ["112", "110", "108", "124"], correct: 0 },
            { q: "EKUB(a,b)·EKUK(a,b) = ?", opts: ["ab", "a+b", "a-b", "a/b"], correct: 0 },
            { q: "680, 714, 748 sonlarining EKUBini toping.", opts: ["34", "32", "36", "44"], correct: 0 },
            { q: "f(x) = x⁴ - 64x³ + 37x - 31 ko'phad darajasi?", opts: ["4", "7", "3", "2"], correct: 0 },
            { q: "i² = -1 bo'ladigan kompleks son?", opts: ["z = i", "z = -i", "z = 1", "z = -1"], correct: 0 },
            { q: "z = 1 + i sonining trigonometrik shakli?", opts: ["√2(cos π/4 + i sin π/4)", "√2(cos π/4 - i sin π/4)", "cos π/4 + i sin π/4", "2(cos π/4 + i sin π/4)"], correct: 0 },
            { q: "z = 1 + i uchun z¹⁰ ni hisoblang:", opts: ["32i", "32", "-32i", "-32"], correct: 0 },
            { q: "|1 + i| modulni hisoblang:", opts: ["√2", "1", "2", "√3"], correct: 0 },
            { q: "Muavr formulasiga ko'ra (cos φ + i sin φ)ⁿ = ?", opts: ["cos nφ + i sin nφ", "cos φ + i sin φ", "n cos φ + i n sin φ", "cos φ/n + i sin φ/n"], correct: 0 },
            { q: "f(x) = x² + 1 ko'phad qaysi maydonda keltiriladi?", opts: ["C", "Q", "R", "Z"], correct: 0 },
            { q: "f(x) = (x-1)³(x-9) ko'phad uchun karrali ildiz qaysi?", opts: ["1", "9", "3", "0"], correct: 0 },
            { q: "Evklid algoritmi natijasida nimani aniqlash mumkin?", opts: ["Ikki ko'phadning EKUBini", "Ikki ko'phadning ko'paytmasini", "Ikki ko'phadning bo'linmasini", "Ikki ko'phadning EKUKini"], correct: 0 },
            { q: "f(x) = (x-1)(x-9), g(x) = (x-1)²(x-9) ko'phadlar EKUBi?", opts: ["(x-1)(x-9)", "(x-1)³(x-9)", "(x-1)³(x-9)²", "(x-1)²(x-9)"], correct: 0 },
            { q: "f(x) = x² + 16 ko'phad qaysi maydonda keltiriladi?", opts: ["C", "Q", "R", "Z"], correct: 0 },
            { q: "Ko'phadlarni ko'paytirish kommutativmi?", opts: ["Kommutativ", "Nokommutativ", "Qisman kommutativ", "Qisman nokommutativ"], correct: 0 },
            { q: "(1+i)(1-i) kompleks sonlar ko'paytmasi?", opts: ["2", "0", "2i", "-2i"], correct: 0 },
            { q: "f(x) = -3x² + x + 5 ko'phadni x-2 ga bo'lganda qoldiq?", opts: ["-5", "-3", "-6", "-4"], correct: 0 },
            { q: "f(x) = -3x² + x + 5 ko'phadni x-2 ga bo'lganda bo'linma?", opts: ["-3x-5", "3x-5", "-3x+5", "3x+5"], correct: 0 },
            { q: "f(x) = x² + x + 5 ko'phad ildizlari yig'indisi?", opts: ["-1", "-2", "-3", "-4"], correct: 0 },
            { q: "f(x) = x² + x + 5 ko'phad ildizlari ko'paytmasi?", opts: ["5", "1", "-1", "-5"], correct: 0 },
            { q: "|2+3i| modulni hisoblang:", opts: ["√13", "5", "√5", "13"], correct: 0 },
            { q: "Bir o'zgaruvchili ko'phadlarni qo'shish kommutativmi?", opts: ["Kommutativ bo'ladi", "Kommutativ bo'lmaydi", "Ba'zan kommutativ bo'ladi", "Agar ko'phadlar teng bo'lsa"], correct: 0 },
            { q: "Bir o'zgaruvchili ko'phadlarni qo'shish assosiativmi?", opts: ["Assosiativ bo'ladi", "Assosiativ bo'lmaydi", "Ba'zan assosiativ bo'ladi", "Agar ko'phadlar teng bo'lsa"], correct: 0 },
            { q: "Bir o'zgaruvchili ko'phadlarni ko'paytirish assosiativmi?", opts: ["Assosiativ bo'ladi", "Assosiativ bo'lmaydi", "Ba'zan assosiativ bo'ladi", "Agar ko'phadlar teng bo'lsa"], correct: 0 },
            { q: "Bir o'zgaruvchili ko'phadlarni ko'paytirish kommutativmi?", opts: ["Kommutativ bo'ladi", "Kommutativ bo'lmaydi", "Ba'zan kommutativ bo'ladi", "Agar ko'phadlar teng bo'lsa"], correct: 0 },
            { q: "Qachon ko'phad nol ko'phad deyiladi?", opts: ["Barcha koeffisiyentlari nolga teng bo'lsa", "Barcha darajalari nolga teng bo'lsa", "Yuqori hadi nolga teng bo'lsa", "Barcha koeffisiyentlari teng bo'lsa"], correct: 0 }
        ];

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let questions = shuffle([...QUIZ_DATA]);
        let current = 0, correct = 0, answered = false;

        const quizEl = document.getElementById('quiz');
        const progressEl = document.getElementById('progress');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const sectionBadge = document.getElementById('sectionBadge');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('nextBtn');

        function render() {
            if (current >= questions.length) { showScore(); return; }
            const q = questions[current];
            progressEl.textContent = `Savol ${current+1} / ${questions.length}`;
            scoreDisplay.textContent = `✅ ${correct}`;
            sectionBadge.textContent = "Algebra va Sonlar Nazariyasi";
            questionEl.textContent = q.q;
            optionsEl.innerHTML = '';
            const opts = q.opts.map((t, i) => ({ text: t, isCorrect: i === q.correct }));
            shuffle(opts);
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.dataset.correct = opt.isCorrect;
                btn.addEventListener('click', () => handleClick(btn, opt.isCorrect));
                optionsEl.appendChild(btn);
            });
            nextBtn.disabled = true;
            answered = false;
            nextBtn.textContent = current === questions.length - 1 ? '🏁 Yakunlash' : 'Keyingi →';
        }

        function handleClick(btn, isCorrect) {
            if (answered) return;
            answered = true;
            const all = optionsEl.querySelectorAll('.option-btn');
            all.forEach(b => b.classList.add('disabled'));
            all.forEach(b => { if (b.dataset.correct === 'true') b.classList.add('show-correct'); });
            if (isCorrect) { btn.classList.add('correct'); correct++; } else { btn.classList.add('incorrect'); }
            nextBtn.disabled = false;
        }

        function nextQuestion() { if (!answered) return; current++; render(); }

        function showScore() {
            const pct = Math.round((correct / questions.length) * 100);
            const emoji = pct >= 80 ? '🌟' : pct >= 60 ? '💪' : pct >= 40 ? '📚' : '😢';
            quizEl.innerHTML = `
                <div class="score-screen">
                    <h2>${emoji} Test yakunlandi!</h2>
                    <div class="final-score">
                        To‘g‘ri javoblar: <span>${correct}</span> / ${questions.length}
                        <br><span style="font-size:1rem;color:#9ca3af;">(${pct}%)</span>
                    </div>
                    <button class="restart-btn" onclick="location.reload()">🔄 Qayta boshlash</button>
                </div>
            `;
        }

        nextBtn.addEventListener('click', nextQuestion);
        render();
    </script>
</body>
</html>
